name: agrotrilho_app
description: "Agrotrilho - Rastreabilidade animal para pequenos e médios produtores rurais."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # QR Code generation and scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0

  # Unique ID generation
  uuid: ^4.0.0

  # Date & localization
  intl: ^0.19.0

  # State Management
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
